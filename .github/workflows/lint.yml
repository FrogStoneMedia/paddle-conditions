name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint
          restore-keys: ${{ runner.os }}-pip-lint

      - run: python3 -m pip install ruff
      - run: python3 -m ruff check .
      - run: python3 -m ruff format --check .
