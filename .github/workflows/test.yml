name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements_test.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - run: python3 -m pip install -r requirements_test.txt
      - run: python3 -m pytest tests/ --cov=custom_components/paddle_conditions --cov-report=xml -v
