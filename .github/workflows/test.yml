name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements_test.txt
      - run: pytest tests/ --cov=custom_components/paddle_conditions --cov-report=xml -v
